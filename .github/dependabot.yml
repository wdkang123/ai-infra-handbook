version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    rebase-strategy: auto
    groups:
      npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    rebase-strategy: auto
    groups:
      python-dev-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    rebase-strategy: auto
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope
