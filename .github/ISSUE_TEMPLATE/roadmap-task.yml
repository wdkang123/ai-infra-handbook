name: Roadmap task
description: Propose a bounded task from the public roadmap or generated roadmap pack.
title: "[Roadmap] "
labels:
  - enhancement
  - help wanted
body:
  - type: textarea
    id: learning-value
    attributes:
      label: Learning value
      description: What will become clearer or easier for learners?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested scope
      description: Which files, pages, scripts, or labs might be touched?
      placeholder: docs/08-publication/05-generated-roadmap-pack.md
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should maintainers know this task is complete?
      placeholder: |
        - Page appears in sidebar
        - docs-quality passes
        - Related README link is updated
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
      description: Which command should pass?
      placeholder: PYTHON=.venv/bin/python make public-check
    validations:
      required: false
