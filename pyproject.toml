[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
    ".venv",
    "node_modules",
    "docs/.vitepress/cache",
    "docs/.vitepress/dist",
    "projects/*/outputs",
    "projects/*/results",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
